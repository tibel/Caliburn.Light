name: Continuous Integration
permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Test Core
      run: dotnet test --project tests/Caliburn.Light.Core.Tests

    - name: Test Avalonia
      run: dotnet test --project tests/Caliburn.Light.Avalonia.Tests

  build:

    runs-on: windows-2025-vs2026

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Pack
      run: dotnet pack Caliburn.Light.slnx --configuration Release -p:ContinuousIntegrationBuild=True

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: NuGet packages
        path: bin/platform/**/*.nupkg
